<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Traffic Light</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body>
    <div id="traffic-container">
        <div id="top-container">
            <div id="light-box">
                <div id="light-red"><i id="red-icon" style="color:red; font-size:40px;"></i></div>
                <div id="light-yellow"><i id="yellow-icon" style="color:gold; font-size:40px;"></i></div>
                <div id="light-green"><i id="green-icon" style="color:rgb(0, 255, 0); font-size:40px;"></i></div>
            </div>
        </div>
        <div id="mid-container">
            <div id="pipe"></div>
        </div>
        <div id="bottom-container">
            <div id="bottom">
                <div id="bottom-btn">
                    <button class="btn-red">Red</button>
                    <button class="btn-yellow">Yellow</button>
                    <button class="btn-green">Green</button>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
